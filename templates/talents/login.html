{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card p-4">

            <h3 class="text-center mb-4">Welcome Back</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>
            </form>

            <p class="text-center mt-3 text-muted">
                Don’t have an account?
                <a href="{% url 'register' %}" style="color:#7c6aff;">Register</a>
            </p>

        </div>

    </div>
</div>

{% endblock %}
