{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card p-4">

            <h3 class="text-center mb-4">Create an Account</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password1" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="password2" class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Register As</label>
                    <select name="role" class="form-select bg-dark text-light border-secondary">
                        <option value="student">Student</option>
                        <option value="scout">Scout</option>
                        <option value="organization">Organization</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Register
                </button>
            </form>

            <p class="text-center mt-3 text-muted">
                Already have an account?
                <a href="{% url 'login' %}" style="color:#7c6aff;">Login</a>
            </p>

        </div>

    </div>
</div>

{% endblock %}
