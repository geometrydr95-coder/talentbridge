{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">

        <div class="card p-4">

            <h3 class="mb-4">
                <i class="bi bi-plus-circle" style="color:#7c6aff;"></i> Add Your Talent
            </h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Talent Title</label>
                    <input type="text" name="title" 
                           class="form-control bg-dark text-light border-secondary" 
                           placeholder="e.g. Football, Python Developer" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select bg-dark text-light border-secondary">
                        <option value="sport">Sport</option>
                        <option value="tech">Tech</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" rows="4" 
                              class="form-control bg-dark text-light border-secondary" 
                              placeholder="Describe your talent in detail..." required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Image</label>
                    <input type="file" name="image" 
                           class="form-control bg-dark text-light border-secondary" 
                           accept="image/*">
                </div>

                <div class="mb-3">
                    <label class="form-label">Upload Video</label>
                    <input type="file" name="video" 
                           class="form-control bg-dark text-light border-secondary" 
                           accept="video/*">
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-upload"></i> Submit Talent
                </button>

            </form>

        </div>

    </div>
</div>

{% endblock %}
